services:
  - type: web
    name: ivr-kursim-shabat
    runtime: docker
    branch: main
    autoDeploy: true
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: IVR_SELF_URL
        value: https://ivr-kursim-shabat.onrender.com/ivr_main.php
      - key: ADMIN_PASSWORD
        sync: false
      - key: CRON_SECRET
        generateValue: true

  - type: cron
    name: ivr-kursim-weekly-cleanup
    runtime: docker
    branch: main
    schedule: "0 19 * * 6"
    dockerCommand: >
      php /var/www/html/cron.php
    envVars:
      - key: UPSTASH_REDIS_REST_URL
        fromService:
          name: ivr-kursim-shabat
          type: web
          envVarKey: UPSTASH_REDIS_REST_URL
      - key: UPSTASH_REDIS_REST_TOKEN
        fromService:
          name: ivr-kursim-shabat
          type: web
          envVarKey: UPSTASH_REDIS_REST_TOKEN
      - key: CRON_SECRET
        fromService:
          name: ivr-kursim-shabat
          type: web
          envVarKey: CRON_SECRET

