<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 110" width="420" height="110">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a8f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="2" y="2" width="416" height="106" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Icon box -->
  <rect x="14" y="12" width="82" height="86" rx="12" fill="url(#accentGrad)" opacity="0.15"/>
  <rect x="14" y="12" width="82" height="86" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="1.5"/>

  <!-- Stylized מ icon -->
  <text x="55" y="72" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="white" text-anchor="middle" opacity="0.95">מ</text>

  <!-- Accent bar -->
  <rect x="108" y="22" width="4" height="66" rx="2" fill="url(#accentGrad)"/>

  <!-- Company name in Hebrew -->
  <text x="290" y="58" font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">מאגרים</text>

  <!-- Tagline -->
  <text x="290" y="82" font-family="Arial, sans-serif" font-size="14" fill="#7eb8f7" text-anchor="middle" letter-spacing="0.5">פתרונות דיגיטל מתקדמים</text>

  <!-- Bottom accent dots -->
  <circle cx="148" cy="95" r="3" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="162" cy="95" r="3" fill="url(#accentGrad)" opacity="0.4"/>
  <circle cx="176" cy="95" r="3" fill="url(#accentGrad)" opacity="0.2"/>
</svg>
