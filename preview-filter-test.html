<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>תצוגה מקדימה – סינון דירות</title>
<style>body{margin:0;background:#f3f4f6;padding:20px;font-family:Arial,sans-serif}</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════
     מאגרים – פרסום דירות לשבוע הקרוב
     הדבק בבלוק HTML בוורדפרס / אלמנטור
════════════════════════════════════════════════════ -->
<div id="mg-app" dir="rtl"></div>

<!-- הודעת תשלום שוכר -->
<div dir="rtl" style="max-width:720px;margin:14px auto 0;direction:rtl;text-align:right;border:2.5px solid #c9a84c;border-radius:14px;background:#fffbeb;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;font-family:Arial,sans-serif;box-shadow:0 2px 10px rgba(201,168,76,.18)">
  <div style="flex:1;min-width:200px">
    <div style="font-size:1.05rem;font-weight:700;color:#92400e;margin-bottom:5px">⚠️ חשוב לשוכר הדירה</div>
    <div style="font-size:.93rem;color:#78350f;line-height:1.6">
      בסגירת עסקת שכירות יש לשלם <strong>50 ₪</strong> ולדווח עם מי סגרת בטופס יצירת הקשר שמופיע למטה.
    </div>
  </div>
  <a href="https://www.matara.pro/nedarimplus/online/?mosad=7007382" target="_blank" rel="noopener"
     style="display:inline-block;padding:12px 26px;background:#c9a84c;color:#fff;border-radius:10px;font-weight:700;text-decoration:none;font-size:1rem;white-space:nowrap;font-family:Arial,sans-serif;letter-spacing:.3px;box-shadow:0 2px 8px rgba(201,168,76,.35)">
    לתשלום ←
  </a>
</div>

<style>
#mg-app *{box-sizing:border-box;font-family:Arial,sans-serif}
#mg-app{max-width:720px;margin:0 auto;padding:8px;direction:rtl;text-align:right}
.mg-card{background:#fff;border-radius:14px;box-shadow:0 2px 16px rgba(0,0,0,.09);padding:24px;margin-bottom:16px}
.mg-hero{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;border-radius:14px;padding:32px 20px;text-align:center;margin-bottom:20px}
.mg-hero h2{margin:0 0 8px;font-size:1.6rem}
.mg-hero p{margin:0;opacity:.9}
.mg-btn{display:inline-block;padding:11px 28px;border-radius:10px;border:none;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .15s}
.mg-btn-primary{background:#2563eb;color:#fff}
.mg-btn-primary:hover{opacity:.88}
.mg-btn-success{background:#16a34a;color:#fff}
.mg-btn-outline{background:#fff;color:#374151;border:2px solid #d1d5db}
.mg-btn-link{background:none;border:none;color:#2563eb;cursor:pointer;font-size:.9rem;padding:4px}
.mg-select{width:100%;border:1.5px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:1rem;background:#fff;direction:rtl}
.mg-row{display:flex;gap:12px;flex-wrap:wrap}
.mg-col{flex:1;min-width:140px}
.mg-label{display:block;font-weight:700;color:#374151;margin-bottom:6px;font-size:.95rem}
.mg-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.75rem;font-weight:600;margin-left:4px}
.mg-badge-green{background:#dcfce7;color:#15803d}
.mg-badge-blue{background:#dbeafe;color:#1d4ed8}
.mg-badge-gray{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
.mg-listing{border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden;margin-bottom:14px}
.mg-listing-img{height:140px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:2.5rem;overflow:hidden}
.mg-listing-img img{width:100%;height:100%;object-fit:cover}
.mg-listing-body{padding:14px}
.mg-empty{text-align:center;padding:48px 16px;color:#6b7280}
.mg-loading{text-align:center;padding:40px;color:#6b7280}
@media(max-width:500px){.mg-row{flex-direction:column}}
/* ── Ad popup ── */
#mg-ad-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
#mg-ad-box{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:28px 24px;direction:rtl;text-align:right;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.25);animation:mg-pop .3s ease}
@keyframes mg-pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
#mg-ad-close{position:absolute;top:12px;left:14px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#9ca3af;line-height:1}
</style>

<script>
(function(){
'use strict';

// ── MOCK DATA (preview only) ──────────────────────────────────
const MOCK_RESPONSE = {
  ok: true,
  cities: {1:'ירושלים',2:'בני ברק',3:'צפת',4:'טבריה',5:'רחובות',6:'אשדוד'},
  apt_types: {1:'דירה רגילה',2:'דירה חדשה',3:'דירה משופצת',4:'דירת אירוח',5:'צימר',6:'דירה במושב',7:'דירה לחג הקרוב',8:'דירה לבין הזמנים',9:'וילה',10:'מתחם',11:'קמפוס'},
  rental_types: {1:'שבת בלבד',2:'שבת וחג',3:'לבין הזמנים',4:'כל השנה'},
  listings: [
    {id:'1', city:1, neighborhood:0, apt_type:1, rental_type:1, beds:6, bedrooms:3, price:800, floor:'2', features:['parking','ac','wifi','elevator'], description:'דירה נפלאה במרכז ירושלים, קרובה למוסדות', contact_name:'ישראל ישראלי', contact_phone:'050-1234567', contact_email:'', images:[], expires:9999999999},
    {id:'2', city:2, neighborhood:0, apt_type:9, rental_type:2, beds:12, bedrooms:5, price:1500, floor:'קרקע', features:['parking','garden','pool','jacuzzi','swings','bouncy_castle'], description:'וילה מפוארת עם בריכה, ג׳קוזי ונדנדות לילדים', contact_name:'משה כהן', contact_phone:'052-9876543', contact_email:'', images:[], expires:9999999999},
    {id:'3', city:3, neighborhood:0, apt_type:5, rental_type:1, beds:4, bedrooms:2, price:600, floor:'1', features:['balcony','quiet','synagogue','shabbat_mode'], description:'צימר שקט בצפת עם נוף עוצר נשימה', contact_name:'', contact_phone:'', contact_email:'zimmer@example.com', images:[], expires:9999999999},
    {id:'4', city:1, neighborhood:0, apt_type:2, rental_type:3, beds:8, bedrooms:4, price:1200, floor:'5', features:['elevator','ac','wifi','dishwasher','washing'], description:'דירה חדשה ומודרנית לבין הזמנים', contact_name:'שרה לוי', contact_phone:'054-1112233', contact_email:'', images:[], expires:9999999999},
    {id:'5', city:4, neighborhood:0, apt_type:6, rental_type:4, beds:10, bedrooms:4, price:900, floor:'קרקע', features:['garden','parking','crib','ping_pong','snooker','hammock'], description:'דירה במושב ליד הכנרת עם גינה גדולה', contact_name:'דוד גולדברג', contact_phone:'053-5556677', contact_email:'', images:[], expires:9999999999},
    {id:'6', city:2, neighborhood:0, apt_type:10, rental_type:2, beds:20, bedrooms:8, price:2500, floor:'קרקע', features:['parking','ac','pool','table_tennis','ping_pong','bouncy_castle','snooker','jacuzzi'], description:'מתחם גדול לאירועים ושבתות משפחתיות', contact_name:'רחל ברקוביץ', contact_phone:'050-8889990', contact_email:'', images:[], expires:9999999999},
  ]
};

// ── State ─────────────────────────────────────────────────────
const S = {
  allListings: MOCK_RESPONSE.listings,
  allLoaded:   true,
  allFd:       {cities: MOCK_RESPONSE.cities, apt_types: MOCK_RESPONSE.apt_types, rental_types: MOCK_RESPONSE.rental_types},
  filterCity:  0,
  filterRent:  0,
  filterType:  0,
  filterBeds:  0,
  filterFeats: [],
  error: '', success: '',
};

// ── Feature labels ────────────────────────────────────────────
const FMAP = {
  parking:'🅿️ חניה', ac:'❄️ מיזוג', elevator:'🛗 מעלית', balcony:'🌿 מרפסת',
  wifi:'📶 WiFi', washing:'🫧 כביסה', dishwasher:'🍽️ מדיח', bathtub:'🛁 אמבטיה',
  shabbat_mode:'🕯️ שבת', crib:'👶 עריסה', synagogue:'🕍 ביהכ"נ', garden:'🌳 גינה',
  handicapped:'♿ נגיש', quiet:'🔇 שקט',
  pool:'🏊 בריכה', jacuzzi:'🪣 ג׳קוזי', swings:'🛝 נדנדות', hammock:'🌴〰️🌳 ערסל',
  ping_pong:'🏓 פינג פונג', bouncy_castle:'🚗👦 בימבות', snooker:'🎱 סנוקר',
  table_tennis:'🎾 טניס שולחן'
};

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function render(html){ document.getElementById('mg-app').innerHTML = html; }

// ── Apartment card ────────────────────────────────────────────
function aptCard(a, fd) {
  const cityName = fd.cities?.[a.city] || a.city;
  const typeName = fd.apt_types?.[a.apt_type] || '';
  const rentName = fd.rental_types?.[a.rental_type] || '';
  const feats    = (a.features||[]).map(f=>`<span class="mg-badge mg-badge-blue">${FMAP[f]||f}</span>`).join('');
  const price    = a.price > 0 ? `<span class="mg-badge" style="background:#fef3c7;color:#92400e">₪${Number(a.price).toLocaleString()}</span>` : '';
  const roomsTxt = a.bedrooms == 0 ? 'סטודיו' : a.bedrooms + " חד'";
  const contactLine = a.contact_phone
    ? `📞 <a href="tel:${esc(a.contact_phone)}" style="color:#15803d;font-weight:700;text-decoration:none">${esc(a.contact_phone)}</a>`
    : a.contact_email
      ? `✉️ <a href="mailto:${esc(a.contact_email)}" style="color:#15803d;font-weight:700;text-decoration:none">${esc(a.contact_email)}</a>`
      : '';
  const contact = contactLine
    ? `<div style="margin-top:8px;padding:8px 12px;background:#f0fdf4;border-radius:8px;font-size:.9rem">
         ${contactLine}${a.contact_name ? ' · <span style="color:#374151">' + esc(a.contact_name) + '</span>' : ''}
       </div>`
    : '';
  return `
    <div class="mg-listing">
      <div class="mg-listing-img">🏠</div>
      <div class="mg-listing-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <strong style="font-size:1.05rem">${esc(cityName)}</strong>
          <span class="mg-badge mg-badge-green" style="white-space:nowrap">${esc(rentName)}</span>
        </div>
        <div style="margin-bottom:6px">
          <span class="mg-badge mg-badge-gray">${esc(typeName)}</span>
          <span class="mg-badge mg-badge-gray">${roomsTxt}</span>
          <span class="mg-badge mg-badge-gray">${a.beds} 🛏</span>
          ${price}
        </div>
        ${feats ? `<div style="margin-bottom:6px;line-height:1.8">${feats}</div>` : ''}
        ${a.description ? `<p style="font-size:.87rem;color:#4b5563;margin:0 0 6px">${esc(a.description)}</p>` : ''}
        ${contact}
      </div>
    </div>`;
}

// ── Filter helpers ────────────────────────────────────────────
function resetFilters() {
  S.filterCity=0; S.filterRent=0; S.filterType=0; S.filterBeds=0; S.filterFeats=[];
  showHome();
}
function toggleFeat(f) {
  const i = S.filterFeats.indexOf(f);
  if (i===-1) S.filterFeats.push(f); else S.filterFeats.splice(i,1);
  showHome();
}
function applyFilter(key, val) {
  S[key] = parseInt(val) || 0;
  showHome();
}

// ── Main view ─────────────────────────────────────────────────
function showHome() {
  const fd      = S.allFd || {};
  const cities  = fd.cities       || {};
  const rentals = fd.rental_types || {};
  const types   = fd.apt_types    || {};

  const sel = (val, opts) => Object.entries(opts).map(([id,n])=>
    `<option value="${id}" ${parseInt(id)===val?'selected':''}>${esc(n)}</option>`).join('');

  const filterFeatBtns = Object.entries(FMAP).map(([k,v])=>{
    const on = S.filterFeats.includes(k);
    return `<button onclick="toggleFeat('${k}')" style="padding:5px 11px;border-radius:20px;border:1.5px solid ${on?'#2563eb':'#d1d5db'};background:${on?'#dbeafe':'#f9fafb'};color:${on?'#1d4ed8':'#374151'};font-size:.8rem;cursor:pointer;margin:3px;transition:all .15s">${v}</button>`;
  }).join('');

  const hasFilter = S.filterCity||S.filterRent||S.filterType||S.filterBeds||S.filterFeats.length;

  let filtered = S.allListings;
  if (S.filterCity) filtered = filtered.filter(a => parseInt(a.city)        === S.filterCity);
  if (S.filterRent) filtered = filtered.filter(a => parseInt(a.rental_type) === S.filterRent);
  if (S.filterType) filtered = filtered.filter(a => parseInt(a.apt_type)    === S.filterType);
  if (S.filterBeds) filtered = filtered.filter(a => parseInt(a.beds)        >= S.filterBeds);
  if (S.filterFeats.length) filtered = filtered.filter(a =>
    S.filterFeats.every(f => (a.features||[]).includes(f))
  );
  const count = filtered.length;

  const cards = count === 0
    ? `<div class="mg-empty"><div style="font-size:2rem">🔍</div><p>לא נמצאו דירות לפי הסינון</p><button class="mg-btn mg-btn-outline" onclick="resetFilters()">נקה סינון</button></div>`
    : `<div style="font-size:.85rem;color:#6b7280;margin-bottom:10px">${count} דירות נמצאו</div>` + filtered.map(a => aptCard(a, fd)).join('');

  render(`
    <div class="mg-hero">
      <div style="font-size:2.5rem">🏡</div>
      <h2>דירות לשבת</h2>
      <p>כל הדירות הזמינות לשבת הקרובה</p>
    </div>
    <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:10px 16px;margin-bottom:14px;font-size:.85rem;color:#856404;text-align:center">
      ℹ️ תצוגה מקדימה עם נתוני הדגמה — הסינון עובד במלואו
    </div>
    <div class="mg-card" style="padding:14px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <strong style="font-size:.95rem">🔍 חיפוש וסינון</strong>
        ${hasFilter ? `<button class="mg-btn-link" onclick="resetFilters()" style="font-size:.82rem;color:#dc2626;font-weight:600">✕ נקה הכל</button>` : ''}
      </div>
      <div class="mg-row" style="margin-bottom:10px">
        <div class="mg-col">
          <label class="mg-label" style="font-size:.82rem">עיר</label>
          <select class="mg-select" onchange="applyFilter('filterCity',this.value)">
            <option value="0">כל הערים</option>${sel(S.filterCity, cities)}
          </select>
        </div>
        <div class="mg-col">
          <label class="mg-label" style="font-size:.82rem">סוג השכרה</label>
          <select class="mg-select" onchange="applyFilter('filterRent',this.value)">
            <option value="0">הכל</option>${sel(S.filterRent, rentals)}
          </select>
        </div>
      </div>
      <div class="mg-row" style="margin-bottom:10px">
        <div class="mg-col">
          <label class="mg-label" style="font-size:.82rem">סוג דירה</label>
          <select class="mg-select" onchange="applyFilter('filterType',this.value)">
            <option value="0">הכל</option>${sel(S.filterType, types)}
          </select>
        </div>
        <div class="mg-col">
          <label class="mg-label" style="font-size:.82rem">מינימום מיטות</label>
          <select class="mg-select" onchange="applyFilter('filterBeds',this.value)">
            <option value="0">ללא מגבלה</option>
            ${[2,3,4,5,6,8,10].map(n=>`<option value="${n}" ${S.filterBeds===n?'selected':''}>${n}+</option>`).join('')}
          </select>
        </div>
      </div>
      <div style="font-size:.82rem;color:#6b7280;margin-bottom:6px;font-weight:600">מה יש בדירה:</div>
      <div style="display:flex;flex-wrap:wrap">${filterFeatBtns}</div>
    </div>
    ${cards}
  `);
}

// ── Init ──────────────────────────────────────────────────────
Object.assign(window, {applyFilter, toggleFeat, resetFilters});
showHome();

})();
</script>
</body>
</html>
