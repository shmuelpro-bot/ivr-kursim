@media(max-width:500px){.mg-feat{grid-template-columns:1fr 1fr}.mg-opt{flex-direction:column}}

<script>
(function(){
'use strict';

const API      = 'https://ivr-kursim.onrender.com/api.php';
const TK       = 'mg_token';
const EM       = 'mg_email';
const MAX_IMGS = 4;

// ── State ────────────────────────────────────────────────────
const S = {
  step:     localStorage.getItem(TK) ? 'dashboard' : 'home',
  token:    localStorage.getItem(TK) || null,
  email:    localStorage.getItem(EM) || null,
  error:    '',
  success:  '',
  fd:       null,
  listings: [],
  imgs:     [],
};

// ── API ──────────────────────────────────────────────────────
async function api(action, data={}, timeoutMs=25000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(API, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({action, token: S.token||'', ...data}),
      signal:  ctrl.signal,
    });
    clearTimeout(tid);
    return await r.json();
  } catch(e) {
    clearTimeout(tid);
    if (e.name === 'AbortError' && timeoutMs < 70000) {
      const el = document.getElementById('mg-status-msg');
      if (el) el.textContent = 'השרת מתעורר… ממתין (עד 60 שנ\')';
      return api(action, data, 70000);
    }
    return {ok:false, error:'שגיאת תקשורת – נסה שנית'};
  }
}

async function imgToB64(file) {
  return new Promise(res => {
    const canvas = document.createElement('canvas');
    const img    = new Image();
    const url    = URL.createObjectURL(file);
    img.onload = () => {
      const maxW=900, maxH=700;
      let w=img.width, h=img.height;
      const ratio = Math.min(maxW/w, maxH/h, 1);
      w=Math.round(w*ratio); h=Math.round(h*ratio);
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(canvas.toDataURL('image/jpeg', 0.72));
    };
    img.src = url;
  });
}

// ── Render ───────────────────────────────────────────────────
function render(html) {
  document.getElementById('mg-app').innerHTML = html;
}
function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function alert_html() {
  let h='<span id="mg-status-msg" style="display:block;color:#6b7280;font-size:.85rem;text-align:center;min-height:1.2em;margin-bottom:4px"></span>';
  if (S.error)   h+=`<div class="mg-alert mg-alert-err">⚠️ ${esc(S.error)}</div>`;
  if (S.success) h+=`<div class="mg-alert mg-alert-ok">✅ ${esc(S.success)}</div>`;
  return h;
}

      <div style="font-size:2.5rem">🏡</div>
      <h2>פרסום דירה לשבוע הקרוב</h2>
      <p>פרסם דירה להשכרה לשבת – עם אזור אישי ותמונות</p>
    </div>
    ${alert_html()}
    <div class="mg-opt">
      <a onclick="goLogin()">
        <span class="oi">📢</span>
        <strong>פרסם דירה</strong>
        <small>פרסום לשבת הקרובה</small>
      </a>
      <a onclick="goLogin('listings')">
        <span class="oi">👤</span>
        <strong>האזור האישי שלי</strong>
        <small>נהל את הפרסומים שלך</small>
      </a>
    </div>
  `);
}

function showLogin() {
  render(`
    <div class="mg-card" style="max-width:420px;margin:0 auto">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:2.8rem">✉️</div>

        <p style="color:#6b7280;font-size:.9rem;margin:0">הזן את כתובת האימייל שלך – ללא סיסמה</p>
      </div>
      ${alert_html()}
      <label class="mg-label">כתובת אימייל</label>
      <input id="mg-email-in" class="mg-input" type="email" placeholder="you@example.com" inputmode="email" autocomplete="email">
      <button class="mg-btn mg-btn-primary mg-btn-full" style="margin-top:16px;padding:13px;font-size:1.05rem" onclick="doEmailLogin()">
        התחבר ←
      </button>

        <button class="mg-btn-link" onclick="goHome()">← חזרה</button>

  `);

  if (el) { el.focus(); el.addEventListener('keydown', e => { if(e.key==='Enter') doEmailLogin(); }); }
}

    <div class="mg-card" style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border:none">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-size:2rem">👋</span>
        <div style="flex:1;min-width:0">
          <strong>שלום!</strong>
          <div class="mg-email-badge" style="margin-top:4px">${esc(S.email||'')}</div>
        </div>
        <button class="mg-btn-link" style="color:#dc2626;white-space:nowrap" onclick="doLogout()">יציאה</button>
      </div>
    </div>
    ${alert_html()}
    <div class="mg-opt">
      <a onclick="goForm()">
        <span class="oi">➕</span>
        <strong>פרסם דירה חדשה</strong>
        <small>לשבת הקרובה</small>
      </a>
      <a onclick="goListings()">
        <span class="oi">📋</span>
        <strong>הפרסומים שלי</strong>
        <small>צפה ונהל</small>
      </a>
    </div>
  `);
}

function showForm() {
  const fd = S.fd;
  if (!fd) { loadFormData(); return; }

  const cities  = Object.entries(fd.cities).map(([id,n])=>`<option value="${id}">${n}</option>`).join('');
  const types   = Object.entries(fd.apt_types).map(([id,n])=>`<option value="${id}">${n}</option>`).join('');
  const rentals = Object.entries(fd.rental_types).map(([id,n])=>`<option value="${id}">${n}</option>`).join('');
  const features = {
    parking:'🅿️ חניה',ac:'❄️ מיזוג',elevator:'🛗 מעלית',balcony:'🌿 מרפסת',
    wifi:'📶 WiFi',washing:'🫧 כביסה',dishwasher:'🍽️ מדיח',bathtub:'🛁 אמבטיה',
    shabbat_mode:'🕯️ מצב שבת',crib:'👶 עריסה',synagogue:'🕍 ביהכ"נ',garden:'🌳 גינה',
    handicapped:'♿ נגיש',quiet:'🔇 שקט'
  };
  const featHtml = Object.entries(features).map(([k,v])=>
    `<label><input type="checkbox" name="feat" value="${k}"> <span>${v}</span></label>`).join('');

  render(`
    <button class="mg-back" onclick="goDash()">← חזרה</button>
    <div class="mg-card">
      <div class="mg-section-title">📍 מיקום</div>
      ${alert_html()}
      <div class="mg-row">
        <div class="mg-col">
          <label class="mg-label">עיר *</label>
          <select id="mg-city" class="mg-select" onchange="updateNh()">
            <option value="">בחר עיר...</option>${cities}
          </select>
        </div>
        <div class="mg-col">
          <label class="mg-label">שכונה</label>
          <select id="mg-nh" class="mg-select"><option value="0">אופציונלי</option></select>
        </div>
      </div>
      <div style="margin-top:12px">
        <label class="mg-label">קומה</label>
        <input id="mg-floor" class="mg-input mg-input-rtl" placeholder="קרקע / 3 / גג..." style="text-align:right">
      </div>
    </div>

    <div class="mg-card">
      <div class="mg-section-title">🏠 פרטי הדירה</div>
      <div class="mg-row">
        <div class="mg-col">
          <label class="mg-label">סוג דירה *</label>
          <select id="mg-type" class="mg-select"><option value="">בחר...</option>${types}</select>
        </div>
        <div class="mg-col">
          <label class="mg-label">חדרי שינה</label>
          <select id="mg-rooms" class="mg-select">
            <option value="0">סטודיו</option>
            ${[1,2,3,4,5,6,7,8].map(i=>`<option value="${i}" ${i===3?'selected':''}>${i} חד'</option>`).join('')}
          </select>
        </div>
        <div class="mg-col">
          <label class="mg-label">מיטות</label>
          <select id="mg-beds" class="mg-select">
            ${[1,2,3,4,5,6,7,8,10,12].map(i=>`<option value="${i}" ${i===4?'selected':''}>${i} מיטות</option>`).join('')}
          </select>
        </div>
      </div>
    </div>

    <div class="mg-card">
      <div class="mg-section-title">💰 מחיר והשכרה</div>
      <div class="mg-row">
        <div class="mg-col">
          <label class="mg-label">סוג השכרה *</label>
          <select id="mg-rent" class="mg-select">${rentals}</select>
        </div>
        <div class="mg-col">
          <label class="mg-label">מחיר ל-24 שעות (₪)</label>
          <input id="mg-price" class="mg-input" type="number" min="0" max="99999" value="0">
        </div>
      </div>
    </div>

    <div class="mg-card">
      <div class="mg-section-title">✨ מה יש בדירה?</div>
      <div class="mg-feat">${featHtml}</div>
    </div>

    <div class="mg-card">
      <div class="mg-section-title">📝 תיאור</div>
      <textarea id="mg-desc" class="mg-input" maxlength="800"
        placeholder="ספר על הדירה: מיקום, נוחות, קרבה למוסדות..."></textarea>
      <div style="text-align:left;font-size:.8rem;color:#9ca3af" id="mg-desc-c">0 / 800</div>
    </div>

    <div class="mg-card">
      <div class="mg-section-title">🖼️ תמונות (עד ${MAX_IMGS})</div>
      <div class="mg-drop" id="mg-drop" onclick="document.getElementById('mg-file').click()"
           ondragover="event.preventDefault();this.classList.add('over')"
           ondragleave="this.classList.remove('over')"
           ondrop="event.preventDefault();this.classList.remove('over');addImgs(event.dataTransfer.files)">
        <div style="font-size:2rem">📷</div>
        <div style="font-weight:700;margin-top:4px">לחץ להוספת תמונות</div>
        <div style="font-size:.8rem;color:#94a3b8;margin-top:2px">JPG / PNG / WebP – עד 5MB</div>
      </div>
      <input type="file" id="mg-file" multiple accept="image/*" style="display:none" onchange="addImgs(this.files)">
      <div class="mg-thumbs" id="mg-thumbs"></div>
    </div>

    <div class="mg-card">
      <div class="mg-section-title">📞 פרטי קשר</div>
      <div class="mg-row">
        <div class="mg-col">
          <label class="mg-label">שם</label>
          <input id="mg-cname" class="mg-input mg-input-rtl" placeholder="שם מלא (אופציונלי)">
        </div>
        <div class="mg-col">
          <label class="mg-label">טלפון ליצירת קשר</label>
          <input id="mg-cphone" class="mg-input" placeholder="050-000-0000" type="tel">
        </div>
      </div>
    </div>

    <button class="mg-btn mg-btn-success mg-btn-full" style="font-size:1.1rem;padding:14px" onclick="doPublish()">
      🚀 פרסם דירה עכשיו
    </button>
    <div style="height:20px"></div>
  `);

  const ta = document.getElementById('mg-desc');
  const tc = document.getElementById('mg-desc-c');
  if (ta) ta.addEventListener('input', ()=> tc.textContent = ta.value.length + ' / 800');
}

function showListings() {
  if (!S.listingsLoaded) { loadListings(); return; }
  const list = S.listings;
  const cityName = id => (S.listFd?.cities)     ? (S.listFd.cities[id]||id)       : id;
  const typeName = id => (S.listFd?.apt_types)   ? (S.listFd.apt_types[id]||id)    : id;
  const rentName = id => (S.listFd?.rental_types)? (S.listFd.rental_types[id]||id) : id;
  const fmap = {parking:'חניה',ac:'מיזוג',elevator:'מעלית',balcony:'מרפסת',wifi:'WiFi',
    washing:'כביסה',dishwasher:'מדיח',bathtub:'אמבטיה',shabbat_mode:'שבת',
    crib:'עריסה',synagogue:'ביהכ"נ',garden:'גינה',handicapped:'נגיש',quiet:'שקט'};
  const now = Date.now()/1000;

  const cards = list.length === 0
    ? `<div class="mg-empty"><div style="font-size:3rem">🏚️</div><h4>אין פרסומים פעילים</h4>
       <button class="mg-btn mg-btn-primary" onclick="goForm()">פרסם עכשיו</button></div>`
    : list.map(a => {
      const exp  = a.expires < now;
      const img1 = a.images && a.images[0];
      const feats = (a.features||[]).slice(0,5).map(f=>`<span class="mg-badge mg-badge-blue">${fmap[f]||f}</span>`).join('');
      return `
        <div class="mg-listing">
          <div class="mg-listing-img">${img1?`<img src="${img1}">`:'🏠'}</div>
          <div class="mg-listing-body">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
              <strong>${cityName(a.city)}</strong>
              <span class="mg-badge ${exp?'mg-badge-red':'mg-badge-green'}">${exp?'פג תוקף':'פעיל'}</span>
            </div>
            <div style="margin-bottom:6px">
              <span class="mg-badge mg-badge-gray">${typeName(a.apt_type)}</span>
              <span class="mg-badge mg-badge-gray">${a.bedrooms==0?'סטודיו':a.bedrooms+" חד'"}</span>
              <span class="mg-badge mg-badge-gray">${a.beds} 🛏</span>
              ${a.price>0?`<span class="mg-badge" style="background:#fef3c7;color:#92400e">₪${a.price.toLocaleString()}</span>`:''}
            </div>
            ${feats?`<div style="margin-bottom:6px">${feats}</div>`:''}
            ${a.description?`<p style="font-size:.85rem;color:#6b7280;margin:0 0 8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">${esc(a.description)}</p>`:''}
            <div style="display:flex;justify-content:space-between;align-items:center">
              <small style="color:#9ca3af">${rentName(a.rental_type)} · תקף עד ${new Date(a.expires*1000).toLocaleDateString('he-IL')}</small>
              <button class="mg-btn mg-btn-danger" onclick="doDelete('${a.id}')">הסר</button>
            </div>
          </div>
        </div>`;
    }).join('');

  render(`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="margin:0">📋 הפרסומים שלי</h3>
      <button class="mg-btn mg-btn-primary" onclick="goForm()">+ פרסם חדש</button>
    </div>
    <button class="mg-back" onclick="goDash()">← חזרה לדשבורד</button>
    ${alert_html()}
    ${cards}
  `);
}

// ════ ACTIONS ════════════════════════════════════════════════

function goHome()     { S.error='';S.success='';S.step='home';     showHome(); }
function goLogin(to)  { S._afterLogin=to||'form'; S.error='';S.success=''; showLogin(); }
function goDash()     { S.error='';S.success='';S.step='dashboard'; showDashboard(); }
function goForm()     { S.error='';S.success='';S.step='form'; S.imgs=[]; showForm(); }
function goListings() { S.error='';S.success='';S.step='listings'; S.listingsLoaded=false; showListings(); }

async function loadFormData() {
  render(`<div class="mg-loading">⏳ טוען נתונים...<br><span id="mg-status-msg" style="font-size:.82rem;color:#9ca3af"></span></div>`);
  const r = await api('form_data');
  if (!r.ok) { S.error=r.error; showForm(); return; }
  S.fd = r;
  showForm();
}

async function loadListings() {
  render(`<div class="mg-loading">⏳ טוען פרסומים...<br><span id="mg-status-msg" style="font-size:.82rem;color:#9ca3af"></span></div>`);
  const r = await api('my_listings');
  if (r.ok===false && r.error?.includes('מאומת')) { doLogout(); return; }
  if (!r.ok) { S.error=r.error||'שגיאה'; showListings(); return; }
  S.listings    = r.listings || [];
  S.listFd      = {cities:r.cities, apt_types:r.apt_types, rental_types:r.rental_types};
  S.listingsLoaded = true;
  showListings();
}

async function doEmailLogin() {
  const inp = document.getElementById('mg-email-in');
  const em  = inp ? inp.value.trim().toLowerCase() : '';
  S.error = '';
  if (!em || !em.includes('@') || !em.includes('.')) {
    S.error = 'נא להזין כתובת אימייל תקינה';
    showLogin();
    return;
  }
  render(`<div class="mg-loading">⏳ מתחבר...<br><span id="mg-status-msg" style="font-size:.82rem;color:#9ca3af"></span></div>`);
  const r = await api('email_login', {email: em});
  if (!r.ok) { S.error = r.error; showLogin(); return; }
  S.token = r.token; S.email = r.email;
  localStorage.setItem(TK, r.token);
  localStorage.setItem(EM, r.email);
  S.success = 'ברוך הבא! 👋';
  if (S._afterLogin === 'listings') goListings();
  else goDash();
}

async function doPublish() {
  S.error = '';
  const city    = document.getElementById('mg-city')?.value;
  const aptType = document.getElementById('mg-type')?.value;
  if (!city)    { S.error='נא לבחור עיר';      showForm(); return; }
  if (!aptType) { S.error='נא לבחור סוג דירה'; showForm(); return; }

  const feats = [...document.querySelectorAll('input[name=feat]:checked')].map(i=>i.value);
  render(`<div class="mg-loading">⏳ מעלה...<br><span id="mg-status-msg" style="font-size:.82rem;color:#9ca3af"></span></div>`);
  const images = await Promise.all(S.imgs.map(imgToB64));

  const r = await api('publish', {
    city,
    neighborhood:  document.getElementById('mg-nh')?.value    || '0',
    apt_type:      aptType,
    bedrooms:      document.getElementById('mg-rooms')?.value || '1',
    beds:          document.getElementById('mg-beds')?.value  || '4',
    rental_type:   document.getElementById('mg-rent')?.value  || '1',
    price:         document.getElementById('mg-price')?.value || '0',
    floor:         document.getElementById('mg-floor')?.value || '',
    features:      feats,
    description:   document.getElementById('mg-desc')?.value  || '',
    contact_name:  document.getElementById('mg-cname')?.value || '',
    contact_phone: document.getElementById('mg-cphone')?.value|| '',
    images,
  });
  if (!r.ok) { S.error=r.error; showForm(); return; }
  S.success='הדירה פורסמה בהצלחה! 🎉';
  S.listingsLoaded=false;
  S.imgs=[];
  goListings();
}

async function doDelete(aptId) {
  if (!confirm('להסיר פרסום זה?')) return;
  const r = await api('delete_apt', {apt_id: aptId});
  if (!r.ok) { S.error=r.error; showListings(); return; }
  S.success='הפרסום הוסר.';
  S.listingsLoaded=false;
  showListings();
}

function doLogout() {
  localStorage.removeItem(TK);
  localStorage.removeItem(EM);
  S.token=null; S.email=null; S.step='home';
  goHome();
}

// ── Image handling ───────────────────────────────────────────
function addImgs(files) {
  Array.from(files).forEach(f => {
    if (S.imgs.length >= MAX_IMGS) return;
    if (!f.type.startsWith('image/')) return;
    if (f.size > 5*1024*1024) { alert('קובץ גדול מ-5MB: ' + f.name); return; }
    S.imgs.push(f);
  });
  refreshThumbs();
}
function removeImg(i) { S.imgs.splice(i,1); refreshThumbs(); }
function refreshThumbs() {
  const wrap = document.getElementById('mg-thumbs');
  const drop = document.getElementById('mg-drop');
  if (!wrap) return;
  wrap.innerHTML = S.imgs.map((f,i)=>`
    <div class="mg-thumb">
      <img src="${URL.createObjectURL(f)}">
      <button onclick="removeImg(${i})">✕</button>
    </div>`).join('');
  if (drop) drop.style.display = S.imgs.length >= MAX_IMGS ? 'none' : '';
}

// ── Neighborhood update ──────────────────────────────────────
function updateNh() {
  const city = parseInt(document.getElementById('mg-city')?.value);
  const sel  = document.getElementById('mg-nh');
  if (!sel || !S.fd) return;
  const nhs = S.fd.neighborhoods[city] || {};
  sel.innerHTML = '<option value="0">אופציונלי</option>' +
    Object.entries(nhs).map(([id,n])=>`<option value="${id}">${n}</option>`).join('');
}

// ── Init ─────────────────────────────────────────────────────
Object.assign(window, {goHome,goLogin,goDash,goForm,goListings,doEmailLogin,doPublish,doDelete,doLogout,addImgs,removeImg,updateNh});

if (S.token && S.email) showDashboard();
else showHome();

})();
</script>
