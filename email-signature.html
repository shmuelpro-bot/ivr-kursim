<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>חתימת מייל</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Heebo', Arial, sans-serif;
      padding: 20px;
    }

    /* ===== ANIMATED BORDER WRAPPER ===== */
    .sig-border-wrap {
      position: relative;
      border-radius: 18px;
      padding: 3px;
      background: linear-gradient(135deg, #00c6ff, #7b2ff7, #ff416c, #00c6ff);
      background-size: 300% 300%;
      animation: borderFlow 4s ease infinite;
      box-shadow:
        0 0 25px rgba(0, 198, 255, 0.4),
        0 0 60px rgba(123, 47, 247, 0.3),
        0 0 100px rgba(255, 65, 108, 0.2);
    }

    @keyframes borderFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== MAIN CARD ===== */
    .sig-card {
      background: linear-gradient(145deg, #12122a 0%, #1a1a3e 50%, #0d1b2e 100%);
      border-radius: 16px;
      padding: 28px 32px;
      min-width: 420px;
      max-width: 520px;
      position: relative;
      overflow: hidden;
    }

    /* glowing orbs in background */
    .sig-card::before,
    .sig-card::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .sig-card::before {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(0,198,255,0.15) 0%, transparent 70%);
      top: -60px; left: -60px;
      animation: orbPulse 5s ease-in-out infinite;
    }
    .sig-card::after {
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(123,47,247,0.18) 0%, transparent 70%);
      bottom: -40px; right: -40px;
      animation: orbPulse 5s ease-in-out infinite reverse;
    }

    @keyframes orbPulse {
      0%,100% { transform: scale(1); opacity: 0.8; }
      50%      { transform: scale(1.3); opacity: 1; }
    }

    /* ===== TOP ROW: avatar + name/title ===== */
    .sig-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .sig-avatar {
      width: 62px; height: 62px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c6ff, #7b2ff7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      flex-shrink: 0;
      animation: avatarGlow 3s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(0,198,255,0.5);
    }

    @keyframes avatarGlow {
      0%,100% { box-shadow: 0 0 20px rgba(0,198,255,0.5); }
      50%      { box-shadow: 0 0 35px rgba(123,47,247,0.8), 0 0 10px rgba(0,198,255,0.6); }
    }

    .sig-name-block {
      flex: 1;
    }

    .sig-name {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.5px;
      line-height: 1.2;
      animation: fadeSlideIn 0.8s ease both;
    }

    .sig-email {
      font-size: 13px;
      color: #00c6ff;
      margin-top: 4px;
      font-weight: 400;
      animation: fadeSlideIn 1s ease both;
      text-decoration: none;
      display: inline-block;
    }
    .sig-email:hover { color: #7b2ff7; transition: color 0.3s; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ===== DIVIDER ===== */
    .sig-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #00c6ff, #7b2ff7, #ff416c, transparent);
      background-size: 200% 100%;
      animation: dividerShine 3s linear infinite;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    @keyframes dividerShine {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===== SERVICES GRID ===== */
    .sig-services {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .sig-service {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
      transition: all 0.3s ease;
      animation: cardPopIn 0.6s ease both;
    }

    .sig-service:nth-child(1) { animation-delay: 0.1s; }
    .sig-service:nth-child(2) { animation-delay: 0.2s; }
    .sig-service:nth-child(3) { animation-delay: 0.3s; }
    .sig-service:nth-child(4) { animation-delay: 0.4s; }

    @keyframes cardPopIn {
      from { opacity: 0; transform: scale(0.85) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .sig-service:hover {
      background: rgba(0,198,255,0.12);
      border-color: rgba(0,198,255,0.5);
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 20px rgba(0,198,255,0.2);
    }

    .service-icon {
      font-size: 20px;
      flex-shrink: 0;
      animation: iconFloat 3s ease-in-out infinite;
    }
    .sig-service:nth-child(1) .service-icon { animation-delay: 0s; }
    .sig-service:nth-child(2) .service-icon { animation-delay: 0.8s; }
    .sig-service:nth-child(3) .service-icon { animation-delay: 1.6s; }
    .sig-service:nth-child(4) .service-icon { animation-delay: 2.4s; }

    @keyframes iconFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }

    .service-text {
      font-size: 13px;
      font-weight: 700;
      color: #e8e8f0;
      line-height: 1.3;
    }

    /* ===== FOOTER TAG LINE ===== */
    .sig-footer {
      margin-top: 18px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .sig-tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 0.3; }
      50%      { opacity: 0.7; }
    }

    /* ===== COPY HINT ===== */
    .copy-hint {
      text-align: center;
      margin-top: 24px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

  <div style="text-align:center;">

    <div class="sig-border-wrap">
      <div class="sig-card">

        <!-- Top: avatar + name/email -->
        <div class="sig-top">
          <div class="sig-avatar">✦</div>
          <div class="sig-name-block">
            <div class="sig-name">פתרונות דיגיטליים מתקדמים</div>
            <a href="mailto:hhyym189@gmail.com" class="sig-email">hhyym189@gmail.com</a>
          </div>
        </div>

        <!-- Animated divider -->
        <div class="sig-divider"></div>

        <!-- Services grid -->
        <div class="sig-services">
          <div class="sig-service">
            <span class="service-icon">🌐</span>
            <span class="service-text">בניית אתרים<br/>ודפי נחיתה</span>
          </div>
          <div class="sig-service">
            <span class="service-icon">📞</span>
            <span class="service-text">הקמת מערכת<br/>טלפונית</span>
          </div>
          <div class="sig-service">
            <span class="service-icon">⚡</span>
            <span class="service-text">אוטומציות</span>
          </div>
          <div class="sig-service">
            <span class="service-icon">🎨</span>
            <span class="service-text">גרפיקה</span>
          </div>
        </div>

        <!-- Footer tagline -->
        <div class="sig-footer">
          <span class="sig-tagline">✦ &nbsp; DIGITAL SOLUTIONS &nbsp; ✦</span>
        </div>

      </div>
    </div>

    <div class="copy-hint">⬆ העתק את קוד ה-HTML ושלב אותו בחתימת המייל שלך</div>

  </div>

</body>
</html>
